# Remote host mode — nav stack on a separate machine, no serial devices
#
# Run this on a powerful desktop/laptop/server that doesn't have the mower's
# USB serial ports attached.  The mowgli container launches the full Nav2 /
# behavior tree / coverage planning stack but disables GPS hardware input
# (OM_NO_GPS=True).  It still exposes rosbridge (port 9090) so the GUI can
# connect from the same host.
#
# The mower Pi runs docker-compose.remote.pi.yaml, which handles only the
# hardware bridge to the STM32 and publishes odometry/sensor topics via DDS
# on the shared network.
#
# Prerequisites:
#   - Both machines must have ROS_DOMAIN_ID set to the same value in .env
#   - Multicast must be routable between the two machines, OR configure
#     FastDDS peer discovery (unicast) via a FASTRTPS_DEFAULT_PROFILES_FILE
#
# Launch:
#   docker compose -f docker-compose.remote.host.yaml up -d

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  mowgli:
    container_name: mowgli-ros2
    image: ${MOWGLI_ROS2_IMAGE}
    network_mode: host
    environment:
      <<: *ros2-env
      OM_NO_GPS: "True"
    command: >
      ros2 launch mowgli_bringup full_system.launch.py
      enable_rosbridge:=true
      enable_foxglove:=true
    volumes:
      - mowgli_maps:/ros2_ws/maps
      - ./config/mowgli:/ros2_ws/config:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m

  gui:
    container_name: openmower-gui
    image: ${GUI_IMAGE}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      project: openmower
      app: gui
    network_mode: host
    environment:
      ROSBRIDGE_URL: ws://localhost:9090
      MOWER_CONFIG_FILE: /config/mower_config.sh
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_PATH: /db
    volumes:
      - ./config/db:/db
      - ./config/om:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mowgli
    restart: unless-stopped

  mosquitto:
    container_name: mowgli-mqtt
    image: eclipse-mosquitto:latest
    hostname: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

volumes:
  mowgli_maps:
