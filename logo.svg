<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0f172a"/>
  <circle cx="256" cy="256" r="240" stroke="#22c55e" stroke-width="8"/>

  <!-- Grass/garden base -->
  <path d="M80 340 Q256 300 432 340 L432 380 Q256 340 80 380 Z" fill="#16a34a" opacity="0.6"/>
  <path d="M60 360 Q256 320 452 360 L452 400 Q256 360 60 400 Z" fill="#22c55e" opacity="0.8"/>

  <!-- Robot mower body -->
  <rect x="156" y="220" rx="24" ry="24" width="200" height="100" fill="#334155"/>
  <rect x="156" y="220" rx="24" ry="24" width="200" height="100" stroke="#475569" stroke-width="3"/>

  <!-- Mower top detail -->
  <rect x="196" y="208" rx="8" ry="8" width="120" height="20" fill="#475569"/>

  <!-- Wheels -->
  <circle cx="196" cy="324" r="22" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <circle cx="196" cy="324" r="10" fill="#334155"/>
  <circle cx="316" cy="324" r="22" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <circle cx="316" cy="324" r="10" fill="#334155"/>

  <!-- LiDAR sensor on top -->
  <circle cx="256" cy="208" r="12" fill="#22c55e"/>
  <circle cx="256" cy="208" r="6" fill="#0f172a"/>

  <!-- LiDAR scan rays -->
  <line x1="256" y1="196" x2="200" y2="160" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="196" x2="230" y2="152" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="196" x2="256" y2="148" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="196" x2="282" y2="152" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="196" x2="312" y2="160" stroke="#22c55e" stroke-width="2" opacity="0.4"/>

  <!-- LiDAR scan arc -->
  <path d="M192 156 Q256 128 320 156" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M180 144 Q256 110 332 144" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- GPS antenna -->
  <line x1="320" y1="208" x2="320" y2="172" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="320" cy="168" r="6" fill="#38bdf8"/>
  <circle cx="320" cy="168" r="3" fill="#0f172a"/>

  <!-- GPS signal waves -->
  <path d="M306 154 Q320 140 334 154" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M300 146 Q320 128 340 146" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- Status LED -->
  <circle cx="192" cy="260" r="5" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Mowing pattern lines on grass -->
  <line x1="100" y1="370" x2="200" y2="365" stroke="#16a34a" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="380" x2="200" y2="375" stroke="#16a34a" stroke-width="2" opacity="0.5"/>
  <line x1="310" y1="365" x2="412" y2="370" stroke="#16a34a" stroke-width="2" opacity="0.5"/>
  <line x1="310" y1="375" x2="412" y2="380" stroke="#16a34a" stroke-width="2" opacity="0.5"/>

  <!-- Text: MowgliNext -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="#f8fafc">
    Mowgli<tspan fill="#22c55e">Next</tspan>
  </text>
  <text x="256" y="465" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#94a3b8" letter-spacing="3">
    mowgli.garden
  </text>
</svg>
