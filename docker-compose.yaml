# Mowgli ROS2 v3 — main deployment
# Requires Docker Compose v2.20+ (no version key needed)

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  # -------------------------------------------------------------------------
  # Main ROS2 robot service
  # Runs the full mowgli_ros2 stack: hardware bridge, Nav2, behavior trees,
  # coverage planning, SLAM map server, rosbridge (port 9090), and optionally
  # foxglove_bridge (port 8765).
  # -------------------------------------------------------------------------
  mowgli:
    container_name: mowgli-ros2
    image: ${MOWGLI_ROS2_IMAGE}
    network_mode: host
    privileged: true
    devices:
      - /dev/mowgli:/dev/mowgli
      - /dev/gps:/dev/gps
      - /dev/lidar:/dev/lidar
    environment:
      <<: *ros2-env
    command: >
      ros2 launch mowgli_bringup full_system.launch.py
      enable_rosbridge:=true
      enable_foxglove:=true
    volumes:
      - mowgli_maps:/ros2_ws/maps
      - ./config/mowgli:/ros2_ws/config:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m

  # -------------------------------------------------------------------------
  # OpenMower GUI — Go backend + React frontend
  # Connects to mowgli's rosbridge WebSocket on ws://localhost:9090
  # -------------------------------------------------------------------------
  gui:
    container_name: openmower-gui
    image: ${GUI_IMAGE}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      project: openmower
      app: gui
    network_mode: host
    environment:
      ROSBRIDGE_URL: ws://localhost:9090
      MOWER_CONFIG_FILE: /config/mower_config.sh
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_PATH: /db
    volumes:
      - ./config/db:/db
      - ./config/om:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mowgli
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # MQTT broker — Home Assistant integration and general pub/sub
  # -------------------------------------------------------------------------
  mosquitto:
    container_name: mowgli-mqtt
    image: eclipse-mosquitto:latest
    labels:
      project: openmower
      app: mqtt
    hostname: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Watchtower — automatic image update polling (watches gui by label)
  # -------------------------------------------------------------------------
  watchtower:
    container_name: mowgli-watchtower
    image: ghcr.io/nicholas-fedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "14400"
      WATCHTOWER_DEBUG: "false"
      WATCHTOWER_LABEL_ENABLE: "true"
    restart: unless-stopped

volumes:
  # Persists SLAM maps across container restarts and image updates
  mowgli_maps:
