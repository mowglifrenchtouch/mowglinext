# Mowgli ROS2 v3 — main deployment
# Requires Docker Compose v2.20+ (no version key needed)

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  # -------------------------------------------------------------------------
  # Main ROS2 robot service
  # Runs the full mowgli_ros2 stack: hardware bridge, Nav2, behavior trees,
  # coverage planning, SLAM map server, rosbridge (port 9090), and optionally
  # foxglove_bridge (port 8765).
  # -------------------------------------------------------------------------
  mowgli:
    container_name: mowgli-ros2
    image: ${MOWGLI_ROS2_IMAGE}
    network_mode: host
    privileged: true
    devices:
      - /dev/mowgli:/dev/mowgli
    environment:
      <<: *ros2-env
    command: >
      ros2 launch mowgli_bringup full_system.launch.py
      enable_rosbridge:=true
      enable_foxglove:=true
    volumes:
      - mowgli_maps:/ros2_ws/maps
      - ./config/mowgli:/ros2_ws/config:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m

  # -------------------------------------------------------------------------
  # GPS — u-blox driver publishes /ublox_gps_node/fix (NavSatFix)
  # The mowgli container's navsat_to_absolute_pose node converts it to
  # /gps/absolute_pose for the localization pipeline.
  # -------------------------------------------------------------------------
  gps:
    container_name: mowgli-gps
    build:
      context: ./gps
    network_mode: host
    privileged: true
    devices:
      - /dev/gps:/dev/gps
    environment:
      <<: *ros2-env
    command: >
      ros2 launch ublox_gps ublox_gps_node-launch.py
        device_port:=/dev/gps
        uart1.baudrate:=921600
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m

  # -------------------------------------------------------------------------
  # NTRIP client — feeds RTK corrections to the u-blox receiver via /rtcm
  # Configure host/port/mountpoint in config/mowgli/mowgli_robot.yaml
  # -------------------------------------------------------------------------
  ntrip:
    container_name: mowgli-ntrip
    build:
      context: ./gps
    network_mode: host
    environment:
      <<: *ros2-env
    command: >
      ros2 run ntrip_client ntrip_ros
        --ros-args
        -p host:=${NTRIP_HOST:-caster.centipede.fr}
        -p port:=${NTRIP_PORT:-2101}
        -p mountpoint:=${NTRIP_MOUNTPOINT:-OUIL}
        -p username:=${NTRIP_USER:-centipede}
        -p password:=${NTRIP_PASSWORD:-centipede}
        -p authentificate:=true
    depends_on:
      - gps
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m

  # -------------------------------------------------------------------------
  # LiDAR driver — LD19 on hardware UART, publishes /scan (LaserScan)
  #
  # Replace this service with a different driver image if you use a different
  # LiDAR (e.g., rplidar, sllidar), as long as it publishes /scan.
  # -------------------------------------------------------------------------
  lidar:
    container_name: mowgli-lidar
    build:
      context: ./lidar
    network_mode: host
    privileged: true
    devices:
      - ${LIDAR_PORT:-/dev/ttyS1}:${LIDAR_PORT:-/dev/ttyS1}
    environment:
      <<: *ros2-env
    command: >
      ros2 run ldlidar_stl_ros2 ldlidar_stl_ros2_node
      --ros-args
      -p product_name:=LDLiDAR_LD19
      -p topic_name:=scan
      -p frame_id:=lidar_link
      -p port_name:=${LIDAR_PORT:-/dev/ttyS1}
      -p port_baudrate:=${LIDAR_BAUD:-230400}
      -p laser_scan_dir:=true
      -p enable_angle_crop_func:=false
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m

  # -------------------------------------------------------------------------
  # OpenMower GUI — Go backend + React frontend
  # Connects to mowgli's rosbridge WebSocket on ws://localhost:9090
  # -------------------------------------------------------------------------
  gui:
    container_name: openmower-gui
    image: ${GUI_IMAGE}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      project: openmower
      app: gui
    network_mode: host
    privileged: true
    environment:
      ROSBRIDGE_URL: ws://localhost:9090
      MOWER_CONFIG_FILE: /config/mower_config.sh
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_PATH: /db
    volumes:
      - ./config/db:/db
      - ./config/om:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev/bus/usb:/dev/bus/usb
    depends_on:
      - mowgli
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # MQTT broker — Home Assistant integration and general pub/sub
  # -------------------------------------------------------------------------
  mosquitto:
    container_name: mowgli-mqtt
    image: eclipse-mosquitto:latest
    labels:
      project: openmower
      app: mqtt
    hostname: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Watchtower — automatic image update polling (watches gui by label)
  # -------------------------------------------------------------------------
  watchtower:
    container_name: mowgli-watchtower
    image: ghcr.io/nicholas-fedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "14400"
      WATCHTOWER_DEBUG: "false"
      WATCHTOWER_LABEL_ENABLE: "true"
    restart: unless-stopped

volumes:
  # Persists SLAM maps across container restarts and image updates
  mowgli_maps:
