# Remote Pi mode — hardware bridge only, no Nav2
#
# Run this on the Raspberry Pi (or Jetson, etc.) that is physically attached
# to the mower board via USB serial.  It launches only the hardware bridge
# node (mowgli.launch.py) which:
#   - Reads STM32 telemetry from /dev/mowgli (or /dev/mowgli via udev)
#   - Reads GNSS from /dev/gps
#   - Publishes odometry, IMU, and motor feedback as ROS2 topics
#   - Accepts velocity commands and blade control from the nav stack
#
# Nav2, behavior trees, coverage planning, and the GUI are all handled by the
# remote host running docker-compose.remote.host.yaml.
#
# DDS discovery:
#   Both machines must share the same ROS_DOMAIN_ID.  Ensure multicast is
#   enabled on the network between the Pi and the remote host, or configure
#   FastDDS unicast peer list.
#
# Launch:
#   docker compose -f docker-compose.remote.pi.yaml up -d

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  mowgli:
    container_name: mowgli-hardware
    image: ${MOWGLI_ROS2_IMAGE}
    network_mode: host
    privileged: true
    devices:
      - /dev/mowgli:/dev/mowgli
      - /dev/gps:/dev/gps
      - /dev/lidar:/dev/lidar
    environment:
      <<: *ros2-env
    # Hardware-only launch: serial bridge to STM32, GPS, basic TF publishers.
    # No Nav2, no behavior tree, no map server, no rosbridge.
    command: ros2 launch mowgli_bringup mowgli.launch.py
    volumes:
      - ./config/mowgli:/ros2_ws/config:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m
