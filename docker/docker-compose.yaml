# Mowgli ROS2 v3 — main deployment
# Requires Docker Compose v2.20+ (no version key needed)

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  CYCLONEDDS_URI: file:///cyclonedds.xml
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  # -------------------------------------------------------------------------
  # Main ROS2 robot service
  # Runs the full mowgli_ros2 stack: hardware bridge, Nav2, behavior trees,
  # coverage planning, SLAM map server, rosbridge (port 9090), and optionally
  # foxglove_bridge (port 8765).
  # -------------------------------------------------------------------------
  mowgli:
    container_name: mowgli-ros2
    image: ${MOWGLI_ROS2_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
    command: >
      ros2 launch mowgli_bringup full_system.launch.py
      enable_rosbridge:=true
      enable_foxglove:=true
      enable_coverage:=true
    volumes:
      - /dev:/dev
      - mowgli_maps:/ros2_ws/maps
      - ./config/mowgli:/ros2_ws/config:ro
      - ./config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m

  # -------------------------------------------------------------------------
  # GPS — u-blox driver + NTRIP client (RTK corrections)
  # Publishes /ublox_gps_node/fix (NavSatFix) on the ROS2 DDS bus.
  # All config read from mowgli_robot.yaml (gps_port, gps_baudrate, ntrip_*).
  # -------------------------------------------------------------------------
  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    build:
      context: ./gps
    network_mode: host
    ipc: host
    privileged: true
    devices:
      - ${GPS_PORT:-/dev/ttyACM1}:/dev/gps
    environment:
      <<: *ros2-env
    volumes:
      - ./config/mowgli:/config:ro
      - ./config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m

  # -------------------------------------------------------------------------
  # LiDAR driver — LD19 on hardware UART, publishes /scan (LaserScan)
  #
  # Replace this service with a different driver image if you use a different
  # LiDAR (e.g., rplidar, sllidar), as long as it publishes /scan.
  # -------------------------------------------------------------------------
  lidar:
    container_name: mowgli-lidar
    image: ${LIDAR_IMAGE}
    build:
      context: ./lidar
    network_mode: host
    ipc: host
    privileged: true
    devices:
      - ${LIDAR_PORT:-/dev/ttyS1}:${LIDAR_PORT:-/dev/ttyS1}
    environment:
      <<: *ros2-env
    command: >
      ros2 run ldlidar_stl_ros2 ldlidar_stl_ros2_node
      --ros-args
      -p product_name:=LDLiDAR_LD19
      -p topic_name:=scan
      -p frame_id:=lidar_link
      -p port_name:=${LIDAR_PORT:-/dev/ttyS1}
      -p port_baudrate:=${LIDAR_BAUD:-230400}
      -p laser_scan_dir:=true
      -p enable_angle_crop_func:=false
    volumes:
      - ./config/cyclonedds.xml:/cyclonedds.xml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m

  # -------------------------------------------------------------------------
  # OpenMower GUI — Go backend + React frontend
  # Connects to mowgli's rosbridge WebSocket on ws://localhost:9090
  # -------------------------------------------------------------------------
  gui:
    container_name: openmower-gui
    image: ${GUI_IMAGE}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      project: openmower
      app: gui
    network_mode: host
    privileged: true
    environment:
      ROSBRIDGE_URL: ws://localhost:9090
      MOWER_CONFIG_FILE: /config/mower_config.sh
      MOWER_YAML_CONFIG_FILE: /mowgli_config/mowgli_robot.yaml
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_PATH: /db
    volumes:
      - ./config/db:/db
      - ./config/om:/config:ro
      - ./config/mowgli:/mowgli_config
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev/bus/usb:/dev/bus/usb
    depends_on:
      - mowgli
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # MQTT broker — Home Assistant integration and general pub/sub
  # -------------------------------------------------------------------------
  mosquitto:
    container_name: mowgli-mqtt
    image: eclipse-mosquitto:latest
    labels:
      project: openmower
      app: mqtt
    hostname: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Watchtower — automatic image update polling (watches gui by label)
  # -------------------------------------------------------------------------
  watchtower:
    container_name: mowgli-watchtower
    image: ghcr.io/nicholas-fedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "14400"
      WATCHTOWER_DEBUG: "false"
      WATCHTOWER_LABEL_ENABLE: "true"
    restart: unless-stopped

volumes:
  # Persists SLAM maps across container restarts and image updates
  mowgli_maps:
