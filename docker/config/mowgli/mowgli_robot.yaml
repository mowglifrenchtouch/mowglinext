# Mowgli Robot Configuration — managed by openmower-gui
# This file is the single source of truth for robot parameters.
# Changes made here are picked up on container restart.

mowgli:
    ros__parameters:
        automatic_mode: 0
        battery_critical_percent: 10
        battery_critical_voltage: 23
        battery_empty_voltage: 24
        battery_full_percent: 95
        battery_full_voltage: 28.5
        battery_low_percent: 20
        blade_radius: 0.09
        coverage_xy_tolerance: 0.5
        datum_lat: 48.879640599999995
        datum_lon: 2.1728332999999997
        dock_approach_distance: 1
        dock_max_retries: 3
        dock_pose_x: 0
        dock_pose_y: 0
        dock_pose_yaw: 0
        dock_use_charger_detection: true
        emergency_stop_on_lift: true
        emergency_stop_on_tilt: true
        gps_antenna_x: 0.173
        gps_antenna_y: -0.004
        gps_antenna_z: 0.2
        gps_baudrate: 921600
        gps_port: /dev/gps
        gps_protocol: UBX
        gps_timeout_sec: 5
        gps_wait_after_undock_sec: 10
        headland_width: 0.18
        imu_x: 0.003
        imu_y: -0.184
        imu_yaw: 0.0882
        imu_z: 0
        lidar_enabled: true
        lidar_x: -0.217
        lidar_y: -0.002
        lidar_yaw: -3.1416
        lidar_z: 0.1
        map_save_on_dock: true
        map_save_path: /ros2_ws/maps/garden_map
        max_obstacle_avoidance_distance: 2
        min_turning_radius: 0.3
        motor_temp_high_c: 80
        motor_temp_low_c: 40
        mow_angle_increment_deg: 0
        mow_angle_offset_deg: -1
        mower_model: YardForce500
        mowing_enabled: true
        mowing_speed: 0.3
        ntrip_enabled: true
        ntrip_host: caster.centipede.fr
        ntrip_mountpoint: OUIL
        ntrip_password: centipede
        ntrip_port: 2101
        ntrip_user: centipede
        outline_offset: 0.05
        outline_passes: 1
        path_spacing: 0.13
        progress_timeout_sec: 60
        rain_debounce_sec: 10
        rain_delay_minutes: 30
        rain_mode: 2
        slam_mode: lifelong
        ticks_per_revolution: 1050
        tool_width: 0.18
        transit_speed: 0.4
        undock_distance: 1.5
        undock_speed: 0.15
        wheel_radius: 0.04475
        wheel_track: 0.325
        wheel_x_offset: -0.18
        xy_goal_tolerance: 0.75
        yaw_goal_tolerance: 1
