# Ser2net / remote serial mode
#
# Use this when the brain (Pi running Docker) is physically separate from the
# mower board.  The mower Pi must run ser2net and expose:
#   port 4001 -> /dev/mowgli  (STM32 serial)
#   port 4002 -> /dev/gps     (GNSS receiver)
#   port 4003 -> /dev/lidar   (LiDAR serial)
#
# socat creates virtual PTYs that the mowgli container reads just like real
# USB serial devices.
#
# ser2net config (on the mower Pi):
#   /etc/ser2net.yaml  (or ser2net.conf on older versions)
#   connection: &mowgli
#     accepter: tcp,4001
#     connector: serialdev,/dev/mowgli,115200n81
#   connection: &gps
#     accepter: tcp,4002
#     connector: serialdev,/dev/gps,460800n81
#   connection: &lidar
#     accepter: tcp,4003
#     connector: serialdev,/dev/lidar,230400n81
#
# Launch (on the remote brain machine):
#   docker compose -f docker-compose.ser2net.yaml up -d

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  # socat relay: TCP -> virtual PTY at /dev/mowgli (STM32)
  mowgli-relay:
    container_name: mowgli-serial-relay
    image: alpine/socat
    command: >
      pty,link=/dev/mowgli,ignoreof,waitslave,group-late=100,user-late=1000,raw,mode=660,echo=0
      tcp:${MOWER_IP}:4001
    privileged: true
    volumes:
      - /dev:/dev
    restart: unless-stopped

  # socat relay: TCP -> virtual PTY at /dev/gps (GNSS)
  gps-relay:
    container_name: mowgli-gps-relay
    image: alpine/socat
    command: >
      pty,link=/dev/gps,ignoreof,waitslave,group-late=100,user-late=1000,raw,mode=660,echo=0
      tcp:${MOWER_IP}:4002
    privileged: true
    volumes:
      - /dev:/dev
    restart: unless-stopped

  # socat relay: TCP -> virtual PTY at /dev/lidar (LiDAR)
  lidar-relay:
    container_name: mowgli-lidar-relay
    image: alpine/socat
    command: >
      pty,link=/dev/lidar,ignoreof,waitslave,group-late=100,user-late=1000,raw,mode=660,echo=0
      tcp:${MOWER_IP}:4003
    privileged: true
    volumes:
      - /dev:/dev
    restart: unless-stopped

  mowgli:
    container_name: mowgli-ros2
    image: ${MOWGLI_ROS2_IMAGE}
    network_mode: host
    privileged: true
    # Serial devices are provided by the socat relays above
    environment:
      <<: *ros2-env
    command: >
      ros2 launch mowgli_bringup full_system.launch.py
      enable_rosbridge:=true
      enable_foxglove:=true
    volumes:
      - mowgli_maps:/ros2_ws/maps
      - ./config/mowgli:/ros2_ws/config:ro
    depends_on:
      - mowgli-relay
      - gps-relay
      - lidar-relay
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m

volumes:
  mowgli_maps:
