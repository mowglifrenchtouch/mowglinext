  <line x1="32" y1="21" x2="32" y2="15" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="21" x2="36" y2="16" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
