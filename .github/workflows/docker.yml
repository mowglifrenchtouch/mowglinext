name: Docker

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}/mowgli-ros2

jobs:
  # ─── Stage 1: Build each (target × arch) via QEMU ──────────────────────────
  build:
    name: Build ${{ matrix.target }} (${{ matrix.arch }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        target: [runtime, simulation]
        arch: [linux/amd64, linux/arm64]
        include:
          - target: runtime
            suffix: ""
          - target: simulation
            suffix: "-sim"

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}${{ matrix.suffix }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.arch }}
          build-args: |
            BUILD_TYPE=Release
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}${{ matrix.suffix }}:buildcache-${{ matrix.arch == 'linux/arm64' && 'arm64' || 'amd64' }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}${{ matrix.suffix }}:buildcache-${{ matrix.arch == 'linux/arm64' && 'arm64' || 'amd64' }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }}${{ matrix.suffix }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Sanitise arch name for artifact
        run: |
          clean=${{ matrix.arch }}
          clean=${clean////-}
          echo "ARTIFACT_NAME=${clean}" >> "$GITHUB_ENV"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target }}-${{ env.ARTIFACT_NAME }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ─── Stage 2: Merge per-arch digests into multi-arch manifest ───────────────
  merge:
    name: Merge manifest (${{ matrix.target }})
    runs-on: ubuntu-24.04
    needs: build

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: runtime
            suffix: ""
          - target: simulation
            suffix: "-sim"

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.target }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}${{ matrix.suffix }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}${{ matrix.suffix }}:${{ steps.meta.outputs.version }}

  # ─── Notify on failure ─────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-24.04
    needs: [build, merge]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Create GitHub issue on repeated failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Docker build failed on main — ${new Date().toISOString().split('T')[0]}`;
            const body = `The Docker CI workflow failed on \`main\`.\n\n` +
              `Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });
            if (!issues.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }
