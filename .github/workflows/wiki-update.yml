name: Suggest Wiki Updates

on:
  push:
    branches: [main]
    paths-ignore:
      - 'wiki/**'
      - 'docs/**'
      - '*.md'
      - '.github/workflows/wiki-*.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wiki-update
  cancel-in-progress: true

jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Check for recent wiki update PRs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if there's already an open wiki update PR
          OPEN_PRS=$(gh pr list --label "wiki" --state open --json number --jq length)
          if [ "$OPEN_PRS" -gt "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Open wiki update PR already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate wiki updates
        if: steps.check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          timeout_minutes: 15
          direct_prompt: |
            You are updating the MowgliNext wiki to reflect recent code changes.

            1. Run `git log --oneline -20` to see recent commits on main.
            2. Read the current wiki pages in `wiki/` to understand existing documentation.
            3. Read `ros2/CLAUDE.md` for the authoritative project state.
            4. For each recent commit, determine if it introduces something that should be documented in the wiki:
               - New features or capabilities
               - Changed deployment steps or commands
               - New configuration options
               - Architecture changes
               - New tools or workflows
            5. If there are wiki updates needed:
               - Edit the relevant files in `wiki/` directly
               - Keep the existing style and structure
               - Be concise — wiki pages should be practical references, not verbose
               - Update `_Sidebar.md` if new pages are added
            6. If no wiki updates are needed, do not make any changes.

            Do NOT create new wiki pages unless a major new feature warrants it.
            Do NOT update wiki pages just for minor bug fixes, dependency bumps, or CI tweaks.
            Focus on changes that affect how users interact with the project.
          allowed_tools: |
            Read
            Write
            Edit
            Bash(git log:*)
            Bash(git diff:*)
            Bash(git show:*)
            Glob
            Grep

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if Claude made any changes
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No wiki updates needed"
            exit 0
          fi

          # Create branch and PR
          BRANCH="docs/wiki-update-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add wiki/
          git commit -m "docs: update wiki for recent changes"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "docs: update wiki for recent changes" \
            --label "wiki,documentation" \
            --body "$(cat <<'EOF'
          ## Summary

          Automated wiki update based on recent commits to main. Generated by Claude.

          **Review the changes carefully** — this is an AI-generated suggestion. Check that:
          - Commands and paths are correct
          - Technical details match the actual implementation
          - No sensitive information is included

          Once merged, the [wiki-sync](.github/workflows/wiki-sync.yml) workflow will push changes to the GitHub wiki.

          ---
          Generated by the [wiki-update](.github/workflows/wiki-update.yml) workflow.
          EOF
          )"
