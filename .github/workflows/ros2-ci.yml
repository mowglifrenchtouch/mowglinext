name: ROS2 — CI

on:
  push:
    branches: [main]
    paths:
      - 'ros2/**'
      - '.github/workflows/ros2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ros2/**'
      - '.github/workflows/ros2-ci.yml'

concurrency:
  group: ros2-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ROS_DISTRO: kilted

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (ROS2 ${{ matrix.ros_distro }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: kilted
            ubuntu: "24.04"

    defaults:
      run:
        working-directory: ros2

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Init FusionCore submodule
        working-directory: .
        run: git submodule update --init ros2/src/fusioncore

      - name: Setup ROS2 ${{ matrix.ros_distro }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}

      - name: Cache rosdep
        uses: actions/cache@v4
        with:
          path: ~/.ros/rosdep
          key: rosdep-${{ matrix.ros_distro }}-${{ hashFiles('ros2/src/**/package.xml') }}
          restore-keys: |
            rosdep-${{ matrix.ros_distro }}-

      - name: Install rosdep dependencies
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          sudo apt-get update
          rosdep update --rosdistro ${{ matrix.ros_distro }}
          rosdep install \
            --from-paths src \
            --ignore-src \
            --rosdistro ${{ matrix.ros_distro }} \
            -y

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            ros2/build
            ros2/install
            ros2/log
          key: colcon-v2-${{ matrix.ros_distro }}-${{ hashFiles('ros2/src/**/CMakeLists.txt', 'ros2/src/**/package.xml', 'ros2/src/**/*.cpp', 'ros2/src/**/*.hpp') }}
          restore-keys: |
            colcon-v2-${{ matrix.ros_distro }}-

      - name: Build workspace
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --parallel-workers $(nproc) \
            --event-handlers console_cohesion+

      - name: Run tests
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test \
            --return-code-on-test-failure \
            --event-handlers console_cohesion+
          colcon test-result --verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.ros_distro }}
          path: |
            ros2/build/**/test_results/**/*.xml
            ros2/log/latest_test/**
          retention-days: 14

  # ─── Formatting Check ────────────────────────────────────────────────────────
  format-check:
    name: Formatting (clang-format)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache pip clang-format
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-clang-format-18.1.8

      - name: Install clang-format
        run: pip install clang-format==18.1.8

      - name: Check formatting
        run: |
          FILES=$(find ros2/src/ \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) \
            -not -path "*/opennav_coverage/*")
          if [ -z "$FILES" ]; then
            echo "No C++ files found — skipping."
            exit 0
          fi
          echo "$FILES" | xargs clang-format --dry-run --Werror -style=file:ros2/.clang-format
          echo "All files are correctly formatted."

  # ─── Static Analysis ─────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          FILES=$(find ros2/src/ \( -name "*.cpp" -o -name "*.hpp" \) \
            -not -path "*/test/*" -not -path "*/opennav_coverage/*")
          if [ -z "$FILES" ]; then
            echo "No C++ files found — skipping."
            exit 0
          fi
          echo "$FILES" | xargs cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --error-exitcode=1 \
            --xml \
            2>cppcheck-report.xml
          echo "$FILES" | xargs cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --error-exitcode=1 \
            --quiet

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.xml
          if-no-files-found: ignore
          retention-days: 7
