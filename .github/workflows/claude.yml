name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          claude_code_config: |
            You are Claude, the AI assistant for MowgliNext — an open-source ROS2 autonomous robot mower.

            Key context:
            - This is a monorepo: ros2/ (ROS2 Jazzy stack), gui/ (React+Go), docker/, sensors/, firmware/ (STM32)
            - The robot has spinning blades — safety is paramount
            - Firmware is the blade safety authority, ROS2 commands are fire-and-forget
            - SLAM is the sole TF authority, EKF publishes odometry only
            - Cyclone DDS (not FastRTPS) for inter-container communication
            - Documentation is in docs/ (single source of truth)

            When helping with code:
            - Follow conventional commits (feat:, fix:, refactor:, etc.)
            - C++ follows .clang-format in ros2/
            - Test coverage matters — add tests when possible
            - Consider ARM deployment (Rockchip boards)
          timeout_minutes: 30
          allowed_tools: |
            Read
            Write
            Edit
            Bash(git diff:*)
            Bash(git log:*)
            Bash(git status:*)
            Bash(grep:*)
            Bash(find:*)
            Bash(cat:*)
            Bash(head:*)
            Bash(wc:*)
            Glob
            Grep
