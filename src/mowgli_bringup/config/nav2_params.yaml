# Nav2 parameters for Mowgli outdoor robot mower.
# Controller: RegulatedPurePursuit (placeholder until FTCController is integrated).
# Planner:    SmacPlanner2D.
# Costmaps configured for outdoor operation with LiDAR at /scan.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /wheel_odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Default Nav2 recovery/navigate BT
    default_nav_to_pose_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    default_nav_through_poses_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml
    # plugin_lib_names: auto-loaded in Jazzy — no manual list needed.
    enable_stamped_cmd_vel: false

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 5.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 600.0

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.25
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # RPP for transit/dock navigation, wrapped in RotationShimController
    # to rotate-in-place toward the path before driving.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      angular_dist_threshold: 0.785  # 45° — rotate in place if heading error > this
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.5
      max_angular_accel: 1.5
      # RPP parameters (passed through to primary controller)
      desired_linear_vel: 0.3
      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.5
      transform_tolerance: 2.0
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.6
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: false
      allow_reversing: false
      max_angular_accel: 1.5
      max_angular_vel: 0.5
      max_robot_pose_search_dist: 100.0

    # FTC controller for coverage path following (path-indexed, no densification needed).
    # PID gains from OpenMower ftc_local_planner tuning.
    FollowCoveragePath:
      plugin: "mowgli_nav2_plugins::FTCController"
      speed_fast: 0.3
      speed_fast_threshold: 1.5
      speed_fast_threshold_angle: 5.0
      speed_slow: 0.1
      speed_angular: 20.0
      acceleration: 0.5
      # PID lateral (cross-track correction)
      kp_lat: 25.0
      ki_lat: 0.06153
      ki_lat_max: 10.0
      kd_lat: 1.23
      # PID longitudinal (along-track speed)
      kp_lon: 1.0
      ki_lon: 0.0
      ki_lon_max: 10.0
      kd_lon: 0.0
      # PID angular (heading correction)
      kp_ang: 1.0
      ki_ang: 0.0
      ki_ang_max: 10.0
      kd_ang: 0.0
      # Limits
      max_cmd_vel_speed: 0.5
      max_cmd_vel_ang: 0.8
      max_goal_distance_error: 1.0
      max_goal_angle_error: 10.0
      goal_timeout: 10.0
      max_follow_distance: 1.0
      forward_only: true
      check_obstacles: true
      obstacle_lookahead: 5
      obstacle_footprint: true
      oscillation_recovery: true
      oscillation_recovery_min_duration: 5.0

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.1
    rotational_acc_lim: 3.2

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ---------------------------------------------------------------------------
# Velocity smoother
# ---------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 0.8]
    min_velocity: [-0.5, 0.0, -0.8]
    max_accel: [0.5, 0.0, 3.2]
    max_decel: [-0.5, 0.0, -3.2]
    odom_topic: /wheel_odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ---------------------------------------------------------------------------
# Global costmap
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      rolling_window: true
      width: 20
      height: 20
      plugins: ["keepout_filter", "obstacle_layer", "inflation_layer"]

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3

# ---------------------------------------------------------------------------
# Local costmap
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.22
      resolution: 0.05
      rolling_window: true
      width: 6
      height: 6
      plugins: ["keepout_filter", "speed_filter", "obstacle_layer", "inflation_layer"]

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: true
        filter_info_topic: "/speed_filter_info"
        speed_limit_topic: "/speed_limit"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          # 150 deg FOV centred forward, 8 m range
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3

# ---------------------------------------------------------------------------
# Map server / AMCL (not used with slam_toolbox, kept for completeness)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Lifecycle manager
# Note: Nav2's navigation_launch.py creates its own lifecycle_manager_navigation
# with the correct node list. This section provides parameters that get merged
# via RewrittenYaml.
# ---------------------------------------------------------------------------
lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
