# Auto-generated by mowglinext installer — do not edit manually
# Re-run the installer to regenerate after changing hardware config

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  CYCLONEDDS_URI: file:///cyclonedds.xml
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"
  LIDAR_ENABLED: ${LIDAR_ENABLED:-true}
  ENABLE_FOXGLOVE: ${ENABLE_FOXGLOVE:-true}

services:

  # -------------------------------------------------------------------------
  # Main ROS2 robot service
  # Runs the full mowgli_ros2 stack: hardware bridge, Nav2, behavior trees,
  # coverage planning, SLAM map server, and foxglove_bridge (port 8765).
  # -------------------------------------------------------------------------
  mowgli:
    container_name: mowgli-ros2
    image: ${MOWGLI_ROS2_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
    command: >
      ros2 launch mowgli_bringup full_system.launch.py
      enable_foxglove:=${ENABLE_FOXGLOVE:-true}
      enable_coverage:=true
      use_lidar:=${LIDAR_ENABLED:-true}
    volumes:
      - /dev:/dev
      - mowgli_maps:/ros2_ws/maps
      - ./config/mowgli:/ros2_ws/config:ro
      - ./config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m


  gui:
    container_name: mowgli-gui
    image: ${GUI_IMAGE}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      project: mowglinext
      app: gui
    network_mode: host
    privileged: true
    environment:
      FOXGLOVE_URL: ws://localhost:8765
      MOWER_CONFIG_FILE: /config/mower_config.sh
      MOWER_YAML_CONFIG_FILE: /mowgli_config/mowgli_robot.yaml
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_PATH: /db
    volumes:
      - ./config/db:/db
      - ./config/om:/config:ro
      - ./config/mowgli:/mowgli_config
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev/bus/usb:/dev/bus/usb
      - mowgli_maps:/ros2_ws/maps
    depends_on:
      - mowgli
    restart: unless-stopped


  mosquitto:
    container_name: mowgli-mqtt
    image: eclipse-mosquitto:latest
    labels:
      project: openmower
      app: mqtt
    hostname: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped


  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
    volumes:
      - /dev:/dev
      - ./config/mowgli:/config:ro
      - ./config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m


  lidar:
    container_name: mowgli-lidar
    image: ${LIDAR_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
    # CMD comes from the image (Myzhar driver via /start_lidar.sh with
    # fixed-bins param file). The old inline command invoked
    # ldrobotSensorTeam/ldlidar_stl_ros2 which isn't in the new image
    # and produces variable scan length anyway.
    volumes:
      - /dev:/dev
      - ./config/cyclonedds.xml:/cyclonedds.xml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m

volumes:
  mowgli_maps:
