  # -------------------------------------------------------------------------
  # OpenMower GUI — Go backend + React frontend
  # Connects to mowgli's foxglove_bridge WebSocket on ws://localhost:8765
  # -------------------------------------------------------------------------
services:
  gui:
    container_name: mowgli-gui
    image: ${GUI_IMAGE}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      project: mowglinext
      app: gui
    network_mode: host
    privileged: true
    environment:
      FOXGLOVE_URL: ws://localhost:8765
      MOWER_CONFIG_FILE: /config/mower_config.sh
      MOWER_YAML_CONFIG_FILE: /mowgli_config/mowgli_robot.yaml
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_PATH: /db
    volumes:
      - ./config/db:/db
      - ./config/om:/config:ro
      - ./config/mowgli:/mowgli_config
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev/bus/usb:/dev/bus/usb
      - mowgli_maps:/ros2_ws/maps
    depends_on:
      - mowgli
    restart: unless-stopped