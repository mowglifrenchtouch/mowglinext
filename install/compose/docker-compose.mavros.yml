x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:
  mavros:
    container_name: mowgli-mavros
    image: ${MAVROS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    volumes:
      - /dev:/dev
    environment:
      <<: *ros2-env
      MAVROS_ENABLED: ${MAVROS_ENABLED:-true}
      MAVROS_PORT: ${MAVROS_PORT:-/dev/mavros}
      MAVROS_BAUD: ${MAVROS_BAUD:-921600}
      MAVROS_GCS_URL: ${MAVROS_GCS_URL:-}
      MAVROS_TGT_SYSTEM: ${MAVROS_TGT_SYSTEM:-1}
      MAVROS_TGT_COMPONENT: ${MAVROS_TGT_COMPONENT:-1}
      MAVROS_AUTOPILOT: ${MAVROS_AUTOPILOT:-ardupilot}
    restart: unless-stopped