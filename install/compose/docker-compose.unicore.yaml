  # -------------------------------------------------------------------------
  # GNSS backend slot used by the current unicore GPS container.
  #
  # The common GNSS contract for backend-specific compose fragments is:
  #   /gnss/fix          -> sensor_msgs/msg/NavSatFix
  #   /gnss/azimuth      -> compass_msgs/msg/Azimuth
  #   /gnss/diagnostics  -> diagnostic_msgs/msg/DiagnosticArray
  #
  # Current compatibility behavior remains unchanged here. This fragment still
  # points at the existing GPS container while dedicated backend fragments can
  # converge on the same external /gnss/* interface later.
  # -------------------------------------------------------------------------
services:
  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    build:
      context: ../sensors/unicore
      dockerfile: Dockerfile
      args:
        UM982_REPO: ${UM982_REPO:-https://github.com/mowglifrenchtouch/UM982Driver.git}
        UM982_REF: ${UM982_REF:-mowgli}

    network_mode: host
    ipc: host
    privileged: true

    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
      CYCLONEDDS_URI: file:///cyclonedds.xml
      RCUTILS_COLORIZED_OUTPUT: "1"
      RCUTILS_LOGGING_USE_STDOUT: "1"
      HARDWARE_BACKEND: ${HARDWARE_BACKEND}

      GPS_CONNECTION: ${GPS_CONNECTION}
      GPS_PROTOCOL: ${GPS_PROTOCOL}
      GPS_PORT: ${GPS_PORT}
      GPS_BY_ID: ${GPS_BY_ID}
      GPS_UART_DEVICE: ${GPS_UART_DEVICE}
      GPS_BAUD: ${GPS_BAUD}

    devices:
      - ${GPS_UART_DEVICE}:${GPS_PORT}

    volumes:
      - ./config/mowgli:/config:ro
      - ./config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m