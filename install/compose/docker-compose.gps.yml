  # -------------------------------------------------------------------------
  # GPS — u-blox driver + NTRIP client (RTK corrections)
  # Publishes /ublox_gps_node/fix (NavSatFix) on the ROS2 DDS bus.
  # All config read from mowgli_robot.yaml (gps_port, gps_baudrate, ntrip_*).
  # -------------------------------------------------------------------------
x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
    volumes:
      - /dev:/dev
      - ./docker/config/mowgli:/config:ro
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
