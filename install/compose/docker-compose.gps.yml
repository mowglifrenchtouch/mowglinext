  # -------------------------------------------------------------------------
  # GNSS backend slot used by the current default GPS container.
  #
  # The common GNSS contract for backend-specific compose fragments is:
  #   /gnss/fix          -> sensor_msgs/msg/NavSatFix
  #   /gnss/azimuth      -> compass_msgs/msg/Azimuth
  #   /gnss/diagnostics  -> diagnostic_msgs/msg/DiagnosticArray
  #
  # Current compatibility behavior remains unchanged here. This fragment still
  # points at the existing GPS container while dedicated backend fragments can
  # converge on the same external /gnss/* interface later.
  # -------------------------------------------------------------------------
x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"
  # Use the bundled cyclonedds.xml so MaxAutoParticipantIndex=500 takes
  # effect — without it cyclone caps at 9 per host and the
  # gps_health_aggregator side-process fails with "Failed to find a
  # free participant index".
  CYCLONEDDS_URI: file:///cyclonedds.xml

services:

  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
      HARDWARE_BACKEND: ${HARDWARE_BACKEND}
      GNSS_BACKEND: ${GNSS_BACKEND}
      GPS_CONNECTION: ${GPS_CONNECTION}
      GPS_PORT: ${GPS_PORT:-${UBLOX_DEVICE_SERIAL_STRING:-/dev/gps}}
      GPS_BY_ID: ${GPS_BY_ID}
      # GPS_DEVICE_PATH is kept as a compatibility alias for older shell
      # entrypoints; GPS_PORT is the canonical runtime contract, while older
      # compose generations fall back to UBLOX_DEVICE_SERIAL_STRING for compose
      # compatibility.
      GPS_DEVICE_PATH: ${GPS_PORT:-${UBLOX_DEVICE_SERIAL_STRING:-/dev/gps}}
      GPS_PROTOCOL: ${GPS_PROTOCOL:-UBX}
      GPS_BAUD: ${GPS_BAUD:-921600}
      GPS_FRAME_ID: ${GPS_FRAME_ID:-gps_link}
    volumes:
      - /dev:/dev
      - ./docker/config/mowgli:/config:ro
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
