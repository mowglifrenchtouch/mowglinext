version: "3.9"

# ---------------------------------------------------------------------------
# Shared configuration fragments
# ---------------------------------------------------------------------------
x-ros-env: &ros-env
  ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
  # Use FastDDS (default for Jazzy). Point to a custom XML profile when
  # running across multiple hosts; leave unset for single-host setups.
  FASTRTPS_DEFAULT_PROFILES_FILE: "${FASTRTPS_DEFAULT_PROFILES_FILE:-}"
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

x-runtime-base: &runtime-base
  image: mowgli-ros2:runtime
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  environment:
    <<: *ros-env
  # host network gives ROS2 DDS the best discovery behaviour on a single host
  network_mode: host
  restart: unless-stopped
  # Shared map storage persisted across container restarts
  volumes:
    - mowgli_maps:/ros2_ws/maps

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # mowgli — main robot service
  # Runs the full hardware bridge, localisation, Nav2, and behaviour tree.
  # Requires physical hardware attached via USB serial.
  # --------------------------------------------------------------------------
  mowgli:
    <<: *runtime-base
    container_name: mowgli
    image: mowgli-ros2:runtime
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    devices:
      # Hardware bridge serial port — adjust if your device appears elsewhere
      - /dev/mowgli:/dev/mowgli
    environment:
      <<: *ros-env
      # Path inside the container where maps are stored / loaded from
      MOWGLI_MAP_DIR: /ros2_ws/maps
    command: ["ros2", "launch", "mowgli_bringup", "full_system.launch.py"]

  # --------------------------------------------------------------------------
  # simulation — Gazebo headless + Nav2 running against the simulated robot.
  # Port 8080 is exposed for the Gazebo web client (gz-web).
  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # simulation — Headless Gazebo + full nav stack + Foxglove bridge.
  # Connect Foxglove Studio to ws://localhost:8765
  # --------------------------------------------------------------------------
  simulation:
    container_name: mowgli_simulation
    image: mowgli-ros2-sim:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: simulation
    environment:
      <<: *ros-env
      DISPLAY: ""
      LIBGL_ALWAYS_SOFTWARE: "1"
    ports:
      - "8765:8765"   # Foxglove Bridge WebSocket
    volumes:
      - mowgli_maps:/ros2_ws/maps
      # Bind-mount source, build, and install trees for live dev without image rebuild
      - ./src:/ros2_ws/src
      - sim_build:/ros2_ws/build
      - sim_install:/ros2_ws/install
      - sim_log:/ros2_ws/log
    restart: unless-stopped
    command: >-
      ros2 launch mowgli_bringup sim_full_system.launch.py
      headless:=true use_rviz:=false

  # --------------------------------------------------------------------------
  # simulation-gui — Same as above but with Gazebo GUI via noVNC.
  # Open http://localhost:6080/vnc.html for the Gazebo window.
  # Connect Foxglove Studio to ws://localhost:8765
  # --------------------------------------------------------------------------
  simulation-gui:
    container_name: mowgli_simulation_gui
    image: mowgli-ros2-sim:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: simulation
    environment:
      <<: *ros-env
      LIBGL_ALWAYS_SOFTWARE: "1"
    ports:
      - "8765:8765"   # Foxglove Bridge WebSocket
      - "6080:6080"   # noVNC web client
    volumes:
      - mowgli_maps:/ros2_ws/maps
    restart: unless-stopped
    entrypoint: ["/ros2_ws/scripts/start_vnc.sh"]

  # --------------------------------------------------------------------------
  # nav — navigation stack only (Nav2 + localisation).
  # Useful when driving the robot from an external hardware bridge or replaying
  # a bag file. Expects odometry and sensor data on the ROS2 DDS bus.
  # --------------------------------------------------------------------------
  nav:
    <<: *runtime-base
    container_name: mowgli_nav
    image: mowgli-ros2:runtime
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["ros2", "launch", "mowgli_bringup", "navigation.launch.py"]

  # --------------------------------------------------------------------------
  # dev-sim-small — Small garden simulation for boundary/path testing.
  # Uses the 10m×8m small_garden world with tight mowing boundary.
  # Gazebo GUI: http://localhost:6080/vnc.html
  # Foxglove:   ws://localhost:8765
  # --------------------------------------------------------------------------
  dev-sim-small:
    container_name: mowgli_dev_sim_small
    image: mowgli-ros2:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      <<: *ros-env
      LIBGL_ALWAYS_SOFTWARE: "1"
      RCUTILS_LOGGING_SEVERITY_THRESHOLD: DEBUG
      LAUNCH_FILE: "sim_small_garden.launch.py"
      LAUNCH_ARGS: "headless:=false use_rviz:=false"
    ports:
      - "8765:8765"   # Foxglove Bridge WebSocket
      - "6080:6080"   # noVNC web client
    volumes:
      - ./src:/ros2_ws/src
      - ./foxglove:/ros2_ws/foxglove
      - dev_build:/ros2_ws/build
      - dev_install:/ros2_ws/install
      - dev_log:/ros2_ws/log
      - mowgli_maps:/ros2_ws/maps
      - mowgli_ccache:/ccache
    restart: unless-stopped
    entrypoint: ["/ros2_ws/scripts/start_dev_sim.sh"]

  # --------------------------------------------------------------------------
  # dev — interactive development container (shell only).
  # Source tree is bind-mounted so colcon builds see live changes without
  # rebuilding the image. A ccache volume speeds up incremental compilation.
  # --------------------------------------------------------------------------
  dev:
    container_name: mowgli_dev
    image: mowgli-ros2:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      <<: *ros-env
      RCUTILS_LOGGING_SEVERITY_THRESHOLD: DEBUG
    network_mode: host
    volumes:
      - ./src:/ros2_ws/src
      - ./foxglove:/ros2_ws/foxglove
      - dev_build:/ros2_ws/build
      - dev_install:/ros2_ws/install
      - dev_log:/ros2_ws/log
      - mowgli_maps:/ros2_ws/maps
      - mowgli_ccache:/ccache
    stdin_open: true
    tty: true
    command: ["bash"]

  # --------------------------------------------------------------------------
  # dev-sim — Development simulation with live source mounts.
  # Edit source on your host, rebuild inside the container, restart the sim.
  #   make dev-sim          Start simulation with volume mounts
  #   make dev-build        Rebuild all packages inside dev-sim
  #   make dev-build-pkg PKG=mowgli_behavior   Rebuild one package
  #   make dev-restart      Restart simulation (picks up rebuilt code)
  # Gazebo GUI: http://localhost:6080/vnc.html
  # Foxglove:   ws://localhost:8765
  # --------------------------------------------------------------------------
  dev-sim:
    container_name: mowgli_dev_sim
    image: mowgli-ros2:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      <<: *ros-env
      LIBGL_ALWAYS_SOFTWARE: "1"
      RCUTILS_LOGGING_SEVERITY_THRESHOLD: DEBUG
    ports:
      - "8765:8765"   # Foxglove Bridge WebSocket
      - "6080:6080"   # noVNC web client
    volumes:
      - ./src:/ros2_ws/src
      - ./foxglove:/ros2_ws/foxglove
      - dev_build:/ros2_ws/build
      - dev_install:/ros2_ws/install
      - dev_log:/ros2_ws/log
      - mowgli_maps:/ros2_ws/maps
      - mowgli_ccache:/ccache
    restart: unless-stopped
    entrypoint: ["/ros2_ws/scripts/start_dev_sim.sh"]

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  # Persistent map storage shared between mowgli, nav, and dev services
  mowgli_maps:
    driver: local

  # ccache volume: survives container restarts, dramatically cuts build times
  mowgli_ccache:
    driver: local

  # Simulation build artifacts (persistent across restarts for fast recompilation)
  sim_build:
    driver: local
  sim_install:
    driver: local
  sim_log:
    driver: local

  # Dev container build artifacts (shared between dev and dev-sim)
  dev_build:
    driver: local
  dev_install:
    driver: local
  dev_log:
    driver: local
