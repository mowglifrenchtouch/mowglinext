# ---------------------------------------------------------------------------
# FusionCore configuration — single UKF fusing GPS + IMU + wheels.
#
# ARCHITECTURE (Cartographer backend):
#   FusionCore publishes odom → base_footprint TF (GPS-aided local odometry).
#   Cartographer publishes map → odom TF (LiDAR scan matching).
#   No GPS-SLAM corrector — GPS is fused directly in FusionCore.
#   Full chain: map → odom → base_footprint.
#
#   GPS in FusionCore provides heading stability via position deltas and
#   global anchoring. q_orientation=0.0001 prevents GPS heading flips.
#
# INPUT TOPICS (remapped in launch file):
#   /wheel_odom  (nav_msgs/Odometry)    — wheel encoder velocity
#   /imu/data    (sensor_msgs/Imu)      — gyro + accel
#   /gps/fix     (sensor_msgs/NavSatFix) — GPS position
#   /gnss/heading (sensor_msgs/Imu)     — dock heading (from hardware_bridge ~/dock_heading)
#
# OUTPUT:
#   /fusion/odom (nav_msgs/Odometry)    — fused state estimate
#   TF: odom → base_footprint          — at publish_rate Hz
# ---------------------------------------------------------------------------
fusioncore_node:
  ros__parameters:
    base_frame: base_footprint
    odom_frame: odom
    # 100 Hz publish halves the TF gap (was 50 Hz → 20 ms max gap). Reduces
    # Cartographer "No transform found for stamp" warnings and costmap/planner
    # TF-staleness races during fast undocking transitions.
    publish_rate: 100.0
    # Force 2D: zero Z in published odom + TF so the costmap rolling
    # window stays in the 2D navigation plane regardless of GPS altitude
    # noise or IMU-Z drift. We're a garden mower — altitude is irrelevant.
    publish.force_2d: true

    # QoS overrides — hardware_bridge publishes /imu/data and /wheel_odom
    # BEST_EFFORT, and ublox_dgnss publishes /gps/fix BEST_EFFORT (sensor
    # data convention). FusionCore's default subscription QoS is RELIABLE,
    # which refuses BEST_EFFORT publishers with "incompatible QoS policy".
    # Without these overrides no IMU/wheel data reaches FusionCore → no
    # odom → slam_toolbox starves.
    qos_overrides:
      /imu/data:
        subscription:
          reliability: best_effort
          durability: volatile
          history: keep_last
          depth: 10
      /wheel_odom:
        subscription:
          reliability: best_effort
          durability: volatile
          history: keep_last
          depth: 10
      /gps/fix:
        subscription:
          reliability: best_effort
          durability: volatile
          history: keep_last
          depth: 10
      /gnss/heading:
        subscription:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10

    # IMU: differential gyro + accel only — no magnetometer.
    # hardware_bridge publishes identity orientation (no real heading).
    # has_magnetometer must be false so FusionCore only uses gyro rates.
    # gyro_noise = 0.03: ground-truth 90° CCW rotation test (2026-04-19)
    # showed WT901 gyro_z integrates to +96.31° for +90° actual — 7%
    # over-report with correct sign. Tightening this (tried 0.015 — 2026-04-19)
    # caused FusionCore σxy to oscillate ±robot-size on dock because the
    # WT901 has ~0.01 rad/s bias that q_gyro_bias couldn't track fast
    # enough once wheel yaw was loosened. Keep 0.03 as stable baseline.
    imu.gyro_noise: 0.03
    imu.accel_noise: 0.1
    imu.has_magnetometer: false
    # Subtract earth's gravity (~9.81 m/s²) from IMU z-axis accel.
    # Our IMU reports raw specific force (gravity included, z ≈ 10.2 m/s²).
    # FusionCore uses the current filter orientation to remove gravity — this
    # prevents z-drift from the 1g bias being treated as real acceleration.
    imu.remove_gravitational_acceleration: true

    # Wheel encoders: calibrated to 0.2% linear error (session notes 2026-04-18).
    # Fallback only — hardware_bridge publishes non-zero per-axis variance in
    # /wheel_odom twist.covariance (vx=0.01, ωz=9e-4), which FusionCore honors
    # directly. These config values apply when the message cov is zero/negative.
    # yaw_noise = 0.02: wheel-differential yaw is the most reliable yaw source
    # on flat ground; loosening this to "trust IMU more" (tried 0.05) caused
    # FusionCore covariance to breathe by robot-size on dock.
    encoder.vel_noise: 0.15
    encoder.yaw_noise: 0.02

    # Second encoder input (Kinematic-ICP LiDAR odometry via adapter).
    # When /encoder2/odom is published (adapter running, gated on use_lidar),
    # FusionCore fuses its twist as an independent vx/vy/wz source to bound
    # yaw drift during GPS degradation (tree canopy, walls). The kinematic
    # prior inside Kinematic-ICP enforces non-holonomic motion, so the twist
    # cannot hallucinate lateral drift the way KISS-ICP did on featureless
    # grass. If no adapter is running this is simply ignored — FusionCore
    # keeps the subscription open but never receives messages. Set to ""
    # to disable entirely when building a split lidar/no-lidar config
    # folder layout later.
    encoder2.topic: "/encoder2/odom"

    # GNSS: u-blox F9P RTK
    # base_noise_xy scales the GPS covariance. At 0.5 (tried on rtabmap)
    # the filter chased Float jitter and heading flipped. At 5.0 the
    # gyro/wheels dominate locally and GPS anchors loosely. FusionCore
    # auto-scales by HDOP, so effective σ adapts per-fix.
    gnss.base_noise_xy: 5.0
    # base_noise_z: 5m — let GPS softly pin altitude around the datum.
    #   ground_constraint (body-frame VZ=0) + gravity removal were NOT
    #   enough on their own: uncompensated accel-z bias integrated over
    #   time, and with GPS altitude effectively ignored (σ=100), Z drifted
    #   to 70m+ after a few minutes of idle on the dock. That pushed LiDAR
    #   scans above obstacle_layer's max_obstacle_height filter → blank
    #   global costmap → nav2 couldn't plan. σ=5m is loose enough to not
    #   fight RTK horizontal accuracy but tight enough to bound drift.
    gnss.base_noise_z: 5.0
    gnss.heading_noise: 0.1
    gnss.max_hdop: 4.0
    gnss.min_satellites: 4
    # Accept Float + Fixed. Strict Fixed (4) starved the filter whenever
    # the receiver was at Float, so FusionCore ran on encoder/IMU only
    # and the unbounded position uncertainty showed up as RTAB-Map
    # map→odom jumps (fast-moving icon on the map). DGPS (2) maps from
    # NavSatFix STATUS_SBAS_FIX which the HP converter emits for
    # carrSoln=1 (Float); ≥2 means "Float or Fixed".
    # FusionCore enum: 0=NO_FIX, 1=GPS, 2=DGPS, 3=RTK_FLOAT, 4=RTK_FIXED.
    # The ROS NavSatFix mapping in fusion_node skips 3, so use 2 or 4.
    gnss.min_fix_type: 2

    # GPS antenna offset from base_link in body frame.
    # Overridden at launch from mowgli_robot.yaml (gps_x/y/z).
    gnss.lever_arm_x: 0.0
    gnss.lever_arm_y: 0.0
    gnss.lever_arm_z: 0.0

    # No second GPS receiver
    gnss.fix2_topic: ""
    # No compass_msgs heading source
    gnss.azimuth_topic: ""

    # Mahalanobis outlier rejection — catches GPS jumps and encoder spikes.
    # GNSS threshold raised from chi2(3,0.999)=16.27 to 100 because the
    # stationary UKF drifts on IMU alone between 5 Hz GPS fixes, causing
    # every fix to be rejected once the first one fails the gate.
    outlier_rejection: true
    # chi2(3, 0.999) = 16.27 — reject real outliers. 100 was effectively
    # disabled, and every 1m Float outlier was absorbed as "truth",
    # causing recorded trajectories to smear into bow-ties.
    outlier_threshold_gnss: 16.27
    outlier_threshold_imu: 15.09    # chi2(6, 0.999)
    outlier_threshold_enc: 11.34    # chi2(3, 0.999)
    # Heading outlier gate effectively disabled (1e6): dock_heading provides
    # the ONLY yaw observation while stationary (no magnetometer, no distance
    # traveled). A tight chi2 gate rejects large initial innovations (filter
    # yaw starts at 0, dock yaw is ~-2.6 rad on this install → innovation ≫ 4σ)
    # and heading_validated_ never flips, so the GPS lever arm stays off and
    # fusion/odom shows the antenna position (30 cm x-bias). The only risk
    # from disabling the gate is a single malformed dock_heading packet
    # rotating the filter; dock_yaw is user-measured at install and published
    # from a const, so in practice this is safe.
    outlier_threshold_hdg: 1000000.0

    # Adaptive noise estimation — auto-tunes from innovation sequence
    adaptive.imu: true
    adaptive.encoder: true
    # Disable adaptive GNSS — auto-shrinking noise when innovations are
    # small at rest makes the filter over-trust GPS during motion, turning
    # Float jitter into visible position drift on the map.
    adaptive.gnss: false
    adaptive.window: 50       # ~1s at 50 Hz publish rate
    adaptive.alpha: 0.01

    # UKF process noise — tuned for upstream 22D quaternion state (commit
    # 9832955). In the new state representation q_orientation is a pure
    # quaternion regularization term (see fusioncore_core/src/ukf.hpp),
    # NOT the old Euler yaw process noise. Keep at 1e-9 like upstream —
    # our prior 1e-4 bloated the orientation distribution by 5 orders of
    # magnitude and leaked into position covariance.
    ukf.q_position: 0.01
    ukf.q_orientation: 1.0e-9
    ukf.q_velocity: 0.1
    ukf.q_angular_vel: 0.1
    ukf.q_acceleration: 1.0
    # Gyro/accel bias process noise: match upstream defaults (1e-5).
    # Our earlier 1e-3 let the bias wander freely every 100Hz step, so
    # WT901 gyro bias was effectively re-estimated at every sample instead
    # of being tracked slowly.
    ukf.q_gyro_bias: 1.0e-5
    ukf.q_accel_bias: 1.0e-5

    # Zero-velocity updates (ZUPT): upstream-native replacement for our
    # hardware_bridge force_zero trick. When |v| < velocity_threshold and
    # |ω| < angular_threshold, fuse v=0 with σ=0.01 m/s. Keeps pose pinned
    # while docked without relying on is_charging_ signal.
    zupt.enabled: true
    zupt.velocity_threshold: 0.05
    zupt.angular_threshold: 0.05
    zupt.noise_sigma: 0.01
