# Nav2 parameters for Mowgli outdoor robot mower.
# Controller: RegulatedPurePursuit (placeholder until FTCController is integrated).
# Planner:    SmacPlanner2D.
# Costmaps configured for outdoor operation with LiDAR at /scan.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /wheel_odom
    bt_loop_duration: 10
    default_server_timeout: 60
    # Custom Nav2 BT that adds GoalCheckerSelector (required when multiple
    # goal_checker_plugins are configured in controller_server).
    default_nav_to_pose_bt_xml: /ros2_ws/install/mowgli_behavior/share/mowgli_behavior/trees/navigate_to_pose.xml
    default_nav_through_poses_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml
    # plugin_lib_names: auto-loaded in Jazzy — no manual list needed.
    enable_stamped_cmd_vel: false

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 5.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker", "coverage_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.02  # tight — even small movements count
      movement_time_allowance: 3600.0 # 1 hour — effectively disabled for long coverage runs

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.25
      xy_goal_tolerance: 0.75
      yaw_goal_tolerance: 1.0

    # Coverage goal checker: used by FTC controller. Only checks position,
    # not velocity. The FTC controller manages its own stopping logic.
    coverage_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28  # Don't check yaw for coverage paths
      stateful: true             # succeed once within tolerance, don't re-check

    # RPP for transit/dock navigation, wrapped in RotationShimController
    # to rotate-in-place toward the path before driving.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      angular_dist_threshold: 0.5    # rotate in place when heading error > ~30deg
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.8
      max_angular_accel: 2.5
      # RPP parameters (passed through to primary controller)
      desired_linear_vel: 0.3
      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.5
      transform_tolerance: 2.0
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.6
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      use_rotate_to_heading: false
      allow_reversing: false
      max_angular_accel: 2.5
      max_angular_vel: 1.5
      max_robot_pose_search_dist: 2.0

    # Follow-the-Carrot controller for coverage mowing.
    # PID-based with rotate-in-place state machine — designed for diff-drive.
    # PRE_ROTATE -> FOLLOWING -> WAITING_FOR_GOAL_APPROACH -> POST_ROTATE
    FollowCoveragePath:
      plugin: "mowgli_nav2_plugins/FTCController"
      speed_fast: 0.4              # carrot speed when far from path (m/s)
      speed_fast_threshold: 0.5    # distance threshold for fast/slow (m)
      speed_fast_threshold_angle: 10.0  # angle threshold for fast (deg)
      speed_slow: 0.15             # carrot speed when close/turning (m/s)
      speed_angular: 30.0          # rotation speed for in-place turns (deg/s)
      acceleration: 0.5            # carrot acceleration (m/s²)
      # PID longitudinal
      kp_lon: 2.0
      ki_lon: 0.0
      kd_lon: 0.0
      # PID lateral
      kp_lat: 2.0
      ki_lat: 0.0
      kd_lat: 0.0
      # PID angular
      kp_ang: 2.0
      ki_ang: 0.0
      kd_ang: 0.0
      # Limits
      max_cmd_vel_speed: 0.4
      max_cmd_vel_ang: 1.8
      max_goal_distance_error: 0.10  # goal reached within 10cm
      max_goal_angle_error: 15.0     # goal angle tolerance (deg)
      goal_timeout: 10.0
      max_follow_distance: 2.0
      forward_only: false            # allow reversing
      # Obstacles — rely on collision_monitor, not costmap
      check_obstacles: false

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.5
    min_rotational_vel: 0.15
    rotational_acc_lim: 2.5

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ---------------------------------------------------------------------------
# Velocity smoother
# ---------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # Topic flow: controller_server → cmd_vel_nav → velocity_smoother →
    #             cmd_vel_smoothed → collision_monitor → cmd_vel → hardware
    input_topic: cmd_vel_nav
    output_topic: cmd_vel_smoothed
    max_velocity: [0.4, 0.0, 1.0]
    min_velocity: [-0.3, 0.0, -1.0]
    max_accel: [0.3, 0.0, 1.5]
    max_decel: [-0.3, 0.0, -1.5]
    odom_topic: /wheel_odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ---------------------------------------------------------------------------
# Global costmap
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # Allow up to 60s for map→base_link TF to appear (SLAM needs time to
      # initialize scan matching before publishing map→odom).
      transform_tolerance: 60.0
      # Footprint computed from mowgli_robot.yaml at launch time
      footprint: "[[0.45, 0.20], [0.45, -0.20], [-0.09, -0.20], [-0.09, 0.20]]"
      resolution: 0.05
      track_unknown_space: false
      # Rolling window large enough to cover transit across any garden.
      # Unknown space is treated as free (track_unknown_space: false) so the
      # planner can plan through unmapped areas — the robot will discover
      # obstacles via LiDAR as it drives.  This supports arbitrarily large
      # gardens: the costmap always centres on the robot, and obstacles are
      # detected in real time by the obstacle_layer.
      rolling_window: true
      width: 100
      height: 100
      # keepout_filter disabled in global costmap: it marks boundary zones
      # as LETHAL causing "Start occupied" when robot is near boundary edge.
      # Boundary enforcement uses local costmap keepout + coverage planner.
      plugins: ["obstacle_layer", "inflation_layer"]

      # Keepout filter config kept for reference but not in plugins list.
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.35

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Tight inflation: just enough for SmacPlanner2D safety margin.
        # 0.30m ≈ robot half-width (0.27m) + small buffer. Keeps transit
        # paths close to obstacles without losing too much mowing area.
        cost_scaling_factor: 5.0
        inflation_radius: 0.40

# ---------------------------------------------------------------------------
# Local costmap
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      footprint: "[[0.45, 0.20], [0.45, -0.20], [-0.09, -0.20], [-0.09, 0.20]]"
      resolution: 0.05
      rolling_window: true
      width: 6
      height: 6
      # keepout_filter removed: it marks boundary as LETHAL in the local
      # costmap which triggers RPP "collision ahead" on swaths near the
      # boundary edge. Boundary enforcement is handled by the coverage
      # planner (swaths stay within the polygon) and the collision_monitor
      # (real LiDAR obstacles only). Speed filter also removed as it depends
      # on the same mask infrastructure.
      plugins: ["obstacle_layer", "inflation_layer"]

      # Keepout filter config kept for reference but not in plugins list.
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

      # Speed filter config kept for reference but not in plugins list.
      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: true
        filter_info_topic: "/speed_filter_info"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          # 150 deg FOV centred forward, 8 m range
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.35

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Tight inflation for local costmap: robot half-width + small margin.
        # Minimizes unmowed area around obstacles during coverage.
        cost_scaling_factor: 5.0
        inflation_radius: 0.40

# ---------------------------------------------------------------------------
# Map server / AMCL (not used with slam_toolbox, kept for completeness)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Docking server (opennav_docking)
# ---------------------------------------------------------------------------
docking_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_link
    fixed_frame: odom
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    # Named dock instances — BT uses dock_id="home_dock"
    dock_plugins: ["simple_charging_dock"]
    docks: ["home_dock"]
    home_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]  # Overridden at launch from dock_pose_x/y/yaw params
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -1.0
      use_external_detection_pose: false
      use_battery_status: true
      battery_topic: "/battery_state"
      use_stall_detection: false
      filter_coef: 0.1

# ---------------------------------------------------------------------------
# Collision monitor
# ---------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    state_topic: collision_monitor_state
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop", "PolygonSlow", "FootprintApproach"]
    # Stop zone: tight safety box matching the robot footprint.
    # front 0.45m, rear -0.09m, width +/-0.20m.
    PolygonStop:
      type: "polygon"
      points: "[[0.45, 0.20], [0.45, -0.20], [-0.09, -0.20], [-0.09, 0.20]]"
      action_type: "stop"
      min_points: 2
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true
    # Slowdown zone: extends 0.30m beyond the robot front for early braking.
    # front 0.75m (0.45 + 0.30), rear -0.09m, width +/-0.30m.
    PolygonSlow:
      type: "polygon"
      points: "[[0.75, 0.30], [0.75, -0.30], [-0.09, -0.30], [-0.09, 0.30]]"
      action_type: "slowdown"
      slowdown_ratio: 0.5
      min_points: 2
      visualize: true
      polygon_pub_topic: "polygon_slow"
      enabled: true
    # Approach: uses dynamic robot footprint with velocity projection.
    # Gradually slows when predicted collision is within time_before_collision.
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.05
      min_points: 1
      visualize: true
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      min_height: 0.15
      max_height: 2.0
      enabled: true

# ---------------------------------------------------------------------------
# Lifecycle manager
# Note: Nav2's navigation_launch.py creates its own lifecycle_manager_navigation
# with the correct node list. This section provides parameters that get merged
# via RewrittenYaml.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Coverage server (legacy opennav_coverage config — kept for reference)
# The B-RV planner (mowgli_brv_planner) now handles coverage planning.
# Called by ComputeCoverage BT node via PlanCoverage action.
# ---------------------------------------------------------------------------
coverage_server:
  ros__parameters:
    use_sim_time: false
    # Robot parameters
    robot_width: 0.40
    operation_width: 0.18
    min_turning_radius: 0.01
    linear_curv_change: 200.0
    # Headland
    default_headland_width: 0.50
    default_headland_type: "CONSTANT"
    # Swath generation
    default_swath_type: "LENGTH"
    default_swath_angle_type: "SET_ANGLE"
    default_swath_angle: 0.0
    default_allow_overlap: false
    # Route ordering
    default_route_type: "BOUSTROPHEDON"
    # Path connecting (turns between swaths)
    default_path_type: "DUBIN"
    default_path_continuity_type: "CONTINUOUS"
    # Coordinate system
    coordinates_in_cartesian_frame: true

route_server:
  ros__parameters:
    use_sim_time: false
    # GeoJSON graph file generated by coverage_planner_node after each plan.
    # The route_server loads this file to serve route requests.
    # Can also be loaded dynamically via the /route_server/load_graph service.
    graph_filepath: "/tmp/mowing_route.geojson"
    base_frame: base_link
    global_frame: map

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
