# Nav2 parameters for Mowgli outdoor robot mower.
# Controller: RegulatedPurePursuit (placeholder until FTCController is integrated).
# Planner:    SmacPlanner2D.
# Costmaps configured for outdoor operation with LiDAR at /scan.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /wheel_odom
    bt_loop_duration: 10
    default_server_timeout: 60
    # Custom Nav2 BT that adds GoalCheckerSelector (required when multiple
    # goal_checker_plugins are configured in controller_server).
    # Paths are injected by navigation.launch.py via RewrittenYaml — keep empty here.
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    # plugin_lib_names: auto-loaded in Kilted — no manual list needed.
    enable_stamped_cmd_vel: true

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # 10 Hz: the controller must close its heading loop faster than the robot
    # can drift off. At 0.3 m/s and 2 Hz the robot slides 15 cm between
    # corrections — it overshoots into an S-curve. 10 Hz keeps each step <3 cm,
    # which is well inside FTC's corridor.
    controller_frequency: 10.0
    # Default 0.30s causes "Costmap timed out waiting for update" error 107
    # on ARM (local_costmap update gaps of 600ms+ at 5Hz, 2-3s under load).
    # 5s gives headroom while we run local_costmap at 10Hz.
    costmap_update_timeout: 5.0
    # Motor static-friction deadband: PWM_PER_MPS=300 in firmware → 0.10 m/s
    # = PWM 30. Anything below ~0.12 m/s buzzes without moving. Zero
    # sub-deadband commands so the motors don't sit in the buzz zone.
    min_x_velocity_threshold: 0.08
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker", "coverage_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Low threshold: in-place rotation barely moves the position but is valid
      # progress. The robot's slow motors need time to complete turns.
      required_movement_radius: 0.01
      movement_time_allowance: 300.0

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.25
      xy_goal_tolerance: 0.75
      yaw_goal_tolerance: 1.0

    # Coverage goal checker: used by FTC controller. Only checks position,
    # not velocity. The FTC controller manages its own stopping logic.
    coverage_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28  # Don't check yaw for coverage paths
      stateful: true             # succeed once within tolerance, don't re-check

    # RPP for transit/dock navigation, wrapped in RotationShimController
    # to rotate-in-place toward the path before driving.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # Rotation shim: only rotate in place for large heading errors (>60°).
      # Small errors are handled by RPP driving in an arc.
      angular_dist_threshold: 1.0
      forward_sampling_distance: 0.5
      # Slow rotation — motors can't handle fast angular commands.
      # Old mowgli project used max_cmd_vel_ang=3.2 but at 1Hz.
      rotate_to_heading_angular_vel: 0.5
      max_angular_accel: 0.5
      # RPP parameters — tuned for slow differential drive motors
      desired_linear_vel: 0.3
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 1.0
      lookahead_time: 1.5
      transform_tolerance: 2.0
      # Larger lookahead = smoother turns, less oscillation
      use_velocity_scaled_lookahead_dist: true
      # Above the ~0.12 m/s motor deadband, otherwise RPP slows to a buzz
      # that never reaches the goal.
      min_approach_linear_velocity: 0.15
      approach_velocity_scaling_dist: 0.6
      # RPP collision detection enabled: the local_costmap now carries an
      # obstacle_layer, so RPP can slow/stop when the path is about to hit
      # a real obstacle (not just the pre-planned path blindly).
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.6
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      # Above motor deadband (PWM_PER_MPS=300 → 0.12 m/s ~ PWM 36).
      regulated_linear_scaling_min_speed: 0.15
      # false: use_rotate_to_heading=true caused pivot oscillation at the
      # rotation_shim hysteresis edge (±0.25 rad/s) on slam-toolbox-tuned.
      # Keep arcs-only — RotationShimController handles initial heading.
      use_rotate_to_heading: false
      allow_reversing: false
      max_angular_vel: 0.8
      max_robot_pose_search_dist: 2.0

    # Follow-the-Carrot controller for coverage mowing.
    # PID-based with rotate-in-place state machine — designed for diff-drive.
    # PRE_ROTATE -> FOLLOWING -> WAITING_FOR_GOAL_APPROACH -> POST_ROTATE
    FollowCoveragePath:
      plugin: "mowgli_nav2_plugins/FTCController"
      speed_fast: 0.5              # carrot speed when far from path (m/s)
      speed_fast_threshold: 0.5    # distance threshold for fast/slow (m)
      speed_fast_threshold_angle: 10.0  # angle threshold for fast (deg)
      speed_slow: 0.3             # carrot speed when close/turning (m/s)
      speed_angular: 60.0          # rotation speed for in-place turns (deg/s)
      acceleration: 1.0            # carrot acceleration (m/s²) — higher to overcome grass
      # PID longitudinal
      kp_lon: 2.0
      ki_lon: 0.0
      kd_lon: 0.0
      # PID lateral
      kp_lat: 2.0
      ki_lat: 0.0
      kd_lat: 0.0
      # PID angular
      kp_ang: 2.0
      ki_ang: 0.0
      kd_ang: 0.0
      # Limits
      max_cmd_vel_speed: 0.5
      max_cmd_vel_ang: 3.0
      max_goal_distance_error: 0.10  # goal reached within 10cm
      max_goal_angle_error: 15.0     # goal angle tolerance (deg)
      goal_timeout: 10.0
      max_follow_distance: 2.0
      forward_only: false            # allow reversing
      # Obstacles: check the local_costmap obstacle_layer for the next
      # `obstacle_lookahead` path poses and abort the strip when one
      # of them falls on a LETHAL cell. Previously disabled, which let
      # the robot creep into walls at 30% speed behind collision_monitor.
      check_obstacles: true
      obstacle_lookahead: 5
      obstacle_footprint: true

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      downsample_costmap: false
      downsampling_factor: 2
      allow_unknown: false
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    # 0.5s sim-ahead (at 0.15 m/s BackUp ≈ 7.5 cm) catches immediate
    # collisions without aborting on phantom LETHAL cells 30-50 cm behind
    # (often map→odom jump artefacts or dock residue). 2.0s refused every
    # undock.
    simulate_ahead_time: 0.5
    max_rotational_vel: 3.0
    # 0.85 rad/s ≈ wheel vel 0.14 m/s per wheel (PWM 42 > deadband).
    # Lower floor let Spin behavior dither at sub-deadband ω.
    min_rotational_vel: 0.85
    rotational_acc_lim: 5.0

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ---------------------------------------------------------------------------
# Velocity smoother
# ---------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # Pipeline topics are wired via launch-file remappings, not yaml
    # (nav2_velocity_smoother doesn't expose input_topic/output_topic as
    # parameters — only 'cmd_vel' and 'smoothed_cmd_vel' remap targets).
    # See nav2_navigation_launch.py for the actual wiring.
    max_velocity: [0.3, 0.0, 0.8]
    min_velocity: [-0.3, 0.0, -1.0]
    # Higher acceleration to overcome grass resistance and static friction.
    # The robot needs a burst of power to start moving on thick terrain.
    # Angular accel 4.0 rad/s² — the smoother was a hidden ceiling that made
    # short turns crawl even after bumping controller-side max_angular_accel.
    max_accel: [0.8, 0.0, 4.0]
    max_decel: [-0.5, 0.0, -4.0]
    odom_topic: /wheel_odom
    odom_duration: 0.1
    # Match motor deadband (PWM ~40 of 300 → 0.13 m/s). Commanded vel below
    # this is zeroed so the motors never sit in the buzz zone.
    deadband_velocity: [0.13, 0.0, 0.0]
    velocity_timeout: 1.0

# ---------------------------------------------------------------------------
# Global costmap
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 1 Hz (was 0.5 Hz): faster updates reduce the chance of Nav2
      # controller_server seeing a stale global costmap during action start.
      # Costmap is 30×30m @ 5cm → obstacle_layer raycast is the main cost,
      # still under 100 ms on ARM so 1 Hz is safe.
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # TF tolerance: how stale a transform can be before the costmap rejects it.
      # Keep this short — stale TF after SLAM corrections projects scans into
      # wrong cells, creating phantom obstacles.  SLAM init delay is handled by
      # wait_for_tf.py, not this parameter.
      transform_tolerance: 5.0
      # Force periodic full publishes even when no obstacles change, so
      # isCurrent() reliably flips true for the planner's waitForCurrent.
      always_send_full_costmap: true
      # Footprint computed from mowgli_robot.yaml at launch time
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      track_unknown_space: false
      # Rolling window large enough to cover transit across any garden.
      # Unknown space is treated as free (track_unknown_space: false) so the
      # planner can plan through unmapped areas — the robot will discover
      # obstacles via LiDAR as it drives.  This supports arbitrarily large
      # gardens: the costmap always centres on the robot, and obstacles are
      # detected in real time by the obstacle_layer.
      rolling_window: true
      width: 30
      height: 30
      # keepout_filter intentionally NOT loaded: marking the area outside
      # the mowing polygon as LETHAL blocks transit and docking routes.
      # Boundary enforcement is handled by the coverage planner via
      # strip-level in-polygon clipping, not the costmap.
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # No persistence: heading drift causes wall duplicates
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /scan
          # Raised from 2.0 to tolerate FusionCore Z drift (seen climbing to
          # 70m+ over minutes when GPS Z is effectively ignored). Without this,
          # all scans get filtered as "too high" and the obstacle_layer stays
          # empty → global costmap blank → controller can't plan around real
          # obstacles. 200m covers any realistic drift window; the LiDAR is a
          # 2D planar sensor so height filtering only matters for multi-layer
          # clouds, which we don't use.
          max_obstacle_height: 200.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          # Garden-tuned: ignore returns closer than 0.5m to filter grass
          # tufts and ground clutter near the LiDAR (mounted at ~0.38m fwd).
          obstacle_min_range: 0.50
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.40

# ---------------------------------------------------------------------------
# Local costmap
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      # Controller checks costmap freshness each cycle; if update_frequency
      # is close to controller_frequency (5 Hz), timing jitter causes
      # sporadic 'Costmap timed out' aborts. Bumped both to 10 Hz.
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_footprint
      # Raised from default 0.3s: on ARM the odom→base_footprint TF lookup
      # occasionally exceeds 300ms of scheduler jitter, causing updateMap()
      # to early-return without setting current_=true → controller_server's
      # waitForCurrent times out every goal with error 107.
      transform_tolerance: 5.0
      # Force periodic full publishes. Without this (default false), the
      # costmap only publishes when its map changes — but with only the
      # inflation_layer and no obstacle source, the map rarely changes,
      # so the publish thread stays idle and isCurrent() never flips true.
      always_send_full_costmap: true
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      rolling_window: true
      width: 6
      height: 6
      # keepout_filter removed: it marks boundary as LETHAL in the local
      # costmap which triggers RPP "collision ahead" on swaths near the
      # boundary edge. Boundary enforcement is handled by the coverage
      # planner (swaths stay within the polygon) and the collision_monitor
      # (real LiDAR obstacles only). Speed filter also removed as it depends
      # on the same mask infrastructure.
      # Obstacle layer ENABLED so FTCController's obstacle lookahead
      # (check_obstacles=true, obstacle_lookahead=5) can avoid LiDAR-seen
      # obstacles on coverage paths. Collision_monitor alone (PolygonSlow
      # at 30%) was letting the robot creep into walls during FollowStrip.
      # observation_persistence=0 keeps the dock cleared when the robot
      # drives away from it, so it doesn't block BackUp on the next cycle.
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /scan
          # Large ceiling so FusionCore Z drift doesn't filter scans out.
          max_obstacle_height: 200.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          # Blank returns within 0.65m: on this robot the charge port is in
          # front, so the dock body sits just ahead of base_footprint
          # (roughly chassis_center_x + chassis_length/2 ≈ 45 cm) when
          # docked. Whether the robot is approaching forward to dock or
          # BackUp-ing to undock, the dock structure is always within 65 cm.
          # Without the blank, it would be marked LETHAL and the BackUp
          # behavior's collision checker (via behavior_server →
          # local_costmap/costmap_raw) would abort undock at error 714
          # "Collision Ahead". 0.65 m covers the dock but still catches
          # real obstacles (walls/fences always >0.65 m during mowing).
          # observation_persistence=0 clears dock residue as the robot
          # drives away, so this doesn't hurt post-undock navigation.
          obstacle_min_range: 0.65
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.40

# ---------------------------------------------------------------------------
# Map server / AMCL (unused — map->odom is a static identity with
# Kinematic-ICP drift correction feeding FusionCore's encoder2 slot;
# kept for completeness / Nav2 lifecycle compatibility)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Docking server (opennav_docking)
# ---------------------------------------------------------------------------
docking_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # 10 Hz (was 2 Hz): tighter approach control + faster polling of
    # isDocked()/isCharging() so the robot stops within ~100 ms of the
    # charging signal arriving rather than up to ~500 ms. Not high
    # enough to starve Nav2/FusionCore on ARM.
    controller_frequency: 10.0
    initial_perception_timeout: 5.0
    # Firmware sets STATUS_BIT_CHARGING only after its own ADC debounce
    # (~2-3 s on this platform). 5 s barely covered that; 10 s gives a
    # comfortable margin while still failing fast if physical contact
    # never actually happens.
    wait_charge_timeout: 10.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_footprint
    fixed_frame: odom
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    # Named dock instances — BT uses dock_id="home_dock"
    dock_plugins: ["simple_charging_dock"]
    docks: ["home_dock"]
    home_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]  # Overridden at launch from dock_pose_x/y/yaw params
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      charging_threshold: 0.1
      # Geometric distance (m) from base_link to dock pose for isDocked().
      # RTK-Fixed gives σ ~3 mm, so 0.05 m is a comfortable envelope
      # covering antenna-lever-arm effects and short GPS glitches.
      # (The earlier 0.5 m was a concession to lifelong-SLAM drift, which
      # no longer applies — FusionCore is the sole localizer.)
      docking_threshold: 0.05
      staging_x_offset: -1.0
      use_external_detection_pose: false
      use_battery_status: true
      battery_topic: "/battery_state"
      use_stall_detection: false
      filter_coef: 0.1

# ---------------------------------------------------------------------------
# Collision monitor
# ---------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_nav
    cmd_vel_out_topic: cmd_vel_safe
    state_topic: collision_monitor_state
    transform_tolerance: 0.2
    # Source timeout: how long before stale sensor data triggers a stop.
    # ARM boards can have TF/scan timing jitter — 5s avoids false stops
    # while still catching genuinely dead sensors.
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # Two-layer protection:
    # 1. Slow zone (chassis +15cm): reduces speed, gives Nav2 time to replan
    # 2. Hard stop (exact chassis): last-resort emergency stop
    # PolygonStop removed — conflicts with Nav2 path following.
    # Costmap planner handles obstacle avoidance. PolygonSlow gives
    # the planner time to reroute without hard-stopping the robot.
    polygons: ["PolygonSlow"]
    PolygonSlow:
      type: "polygon"
      # Chassis + 15cm — slow to 30% when obstacle is close
      points: "[[0.65, 0.35], [0.65, -0.35], [-0.25, -0.35], [-0.25, 0.35]]"
      action_type: "slowdown"
      slowdown_ratio: 0.3
      # 12 points (was 6) — the dock structure sits near the polygon
      # boundary when charging, causing rapid slow/normal flapping at
      # 10 Hz. Higher min_points adds hysteresis against that edge noise.
      min_points: 12
      visualize: true
      polygon_pub_topic: "polygon_slow"
      enabled: true
    # PolygonStop config removed — was defined but not listed in polygons[].
    # See commit cc2a4c4 for why PolygonStop was disabled (conflicts with
    # Nav2 path following). Only PolygonSlow is active.
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      # Garden-tuned: 0.20m min_height filters grass and ground clutter.
      # The LD19 LiDAR is mounted at 0.22m height, so returns below 0.20m
      # are almost certainly ground or grass, not real obstacles.
      min_height: 0.20
      max_height: 2.0
      enabled: true

# ---------------------------------------------------------------------------
# Lifecycle manager
# Note: Nav2's navigation_launch.py creates its own lifecycle_manager_navigation
# with the correct node list. This section provides parameters that get merged
# via RewrittenYaml.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Coverage server (legacy opennav_coverage config — kept for reference).
# Cell-based strip coverage now handles mowing; no external planner needed.
# ---------------------------------------------------------------------------
coverage_server:
  ros__parameters:
    use_sim_time: false
    # Robot parameters
    robot_width: 0.40
    operation_width: 0.18
    min_turning_radius: 0.01
    linear_curv_change: 200.0
    # Headland
    default_headland_width: 0.50
    default_headland_type: "CONSTANT"
    # Swath generation
    default_swath_type: "LENGTH"
    default_swath_angle_type: "SET_ANGLE"
    default_swath_angle: 0.0
    default_allow_overlap: false
    # Route ordering
    default_route_type: "BOUSTROPHEDON"
    # Path connecting (turns between swaths)
    default_path_type: "DUBIN"
    default_path_continuity_type: "CONTINUOUS"
    # Coordinate system
    coordinates_in_cartesian_frame: true

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
