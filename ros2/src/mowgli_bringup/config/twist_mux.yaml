twist_mux:
  ros__parameters:
    # Use geometry_msgs/msg/Twist (unstamped) for compatibility with Nav2
    use_stamped: false

    # Topics are evaluated in ascending priority order.
    # Higher priority overrides lower when active within timeout.
    topics:
      navigation:
        topic: /cmd_vel_nav
        timeout: 0.5      # seconds – source considered stale if no message arrives
        priority: 10      # lowest priority – autonomous navigation

      teleop:
        topic: /cmd_vel_teleop
        timeout: 0.5
        priority: 20      # operator override always beats navigation

      emergency:
        topic: /cmd_vel_emergency
        timeout: 0.2      # tighter timeout for safety-critical source
        priority: 100     # highest velocity-source priority

    # Locks completely suppress output when active (regardless of velocity topics).
    locks:
      emergency_stop:
        topic: /emergency_stop
        timeout: 0.0      # 0 = lock stays engaged until explicitly released
        priority: 255     # maximum possible – hard stop
