slam_toolbox:
  ros__parameters:
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG

    # Mode: mapping | localization | lifelong
    # lifelong: loads existing posegraph if present, keeps adding new scans.
    # The map improves over time — obstacles and features accumulate across
    # sessions.  The navigation.launch.py slam_mode / map_file_name launch
    # args override these values at runtime via RewrittenYaml.
    mode: lifelong
    map_file_name: "/ros2_ws/maps/garden_map"
    map_start_pose: [0.0, 0.0, 0.0]
    map_start_at_dock: true

    # Frame IDs
    odom_frame: odom
    # SLAM Toolbox publishes slam_map→odom (lidar scan matching).
    # GPS-SLAM corrector node publishes map→slam_map (GPS anchor).
    # FusionCore publishes odom→base_footprint (IMU+wheels).
    # Full chain: map→slam_map→odom→base_footprint.
    map_frame: slam_map
    base_frame: base_footprint
    scan_topic: /scan

    # Logging
    debug_logging: false
    throttle_scans: 1

    # TF / map update
    # SLAM Toolbox is TF authority for map→odom (LiDAR scan matching).
    # FusionCore owns odom→base_footprint (GPS+IMU+wheels).
    # No feedback loop: SLAM does not feed into FusionCore.
    transform_publish_period: 0.05    # 20 Hz
    map_update_interval: 2.0          # seconds
    resolution: 0.05                  # metres/cell

    # Scan range
    max_laser_range: 8.0              # metres

    # Timing constraints
    minimum_time_interval: 0.5        # seconds between processed scans
    transform_timeout: 1.0
    tf_buffer_duration: 30.0

    # Memory
    stack_size_to_use: 40000000

    # Interactive mode (RViz plugin)
    enable_interactive_mode: false

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true

    # Minimum motion before adding a new node
    minimum_travel_distance: 0.3     # metres
    minimum_travel_heading: 0.3      # radians (~17 deg)

    # Scan buffer
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 8.0

    # Link matching thresholds
    # Reject poor scan matches rather than accepting noise — in outdoor
    # gardens with few LiDAR features, a low threshold lets SLAM lock onto
    # spurious matches that corrupt the map.
    link_match_minimum_response_fine: 0.2
    link_scan_maximum_distance: 1.5

    # Loop closure
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation search
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop search space
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Variance penalties
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    # Angular search offsets
    fine_search_angle_offset: 0.00349    # ~0.2 deg
    coarse_search_angle_offset: 0.349    # ~20 deg
    coarse_angle_resolution: 0.0349      # ~2 deg

    # Response penalties
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
