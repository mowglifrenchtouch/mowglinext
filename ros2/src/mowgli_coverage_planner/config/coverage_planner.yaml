coverage_planner_node:
  ros__parameters:
    tool_width: 0.18
    # Headland: inset from boundary where no swaths are generated.
    # Must be > robot half-width (0.27m) so the chassis stays inside the
    # boundary.  2 passes × 0.18m = 0.36m ≈ half-width + small margin.
    headland_passes: 2
    headland_width: 0.18
    default_mow_angle: -1.0
    path_spacing: 0.18
    # Turning radius for F2C Dubins path planning.
    # 0.30m produces clean arc turns that work well for both adjacent
    # swaths (small U-turns) and obstacle transitions (smooth arcs).
    # Diff-drive robots execute these as rotate + arc + rotate.
    min_turning_radius: 0.15
    # Cell decomposition: splits non-convex polygons into convex sub-cells.
    # Significantly improves coverage of irregular/L-shaped gardens.
    decompose_cells: true
    map_frame: "map"
    # Speed limits for route_server GeoJSON edges.
    mowing_speed: 0.15
    transit_speed: 0.3
    # Output path for GeoJSON route graph (also published on ~/route_graph).
    route_graph_filepath: "/tmp/mowing_route.geojson"
