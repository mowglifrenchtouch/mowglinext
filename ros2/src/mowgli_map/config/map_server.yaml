map_server_node:
  ros__parameters:
    resolution: 0.05
    map_size_x: 20.0
    map_size_y: 20.0
    map_frame: "map"
    decay_rate_per_hour: 0.1
    mower_width: 0.18
    map_file_path: ""
    areas_file_path: "/ros2_ws/maps/areas.dat"
    publish_rate: 1.0

    # Pre-defined mowing / navigation areas (OpenMower-style).
    # Parallel arrays indexed by position.  Polygon format: "x1,y1;x2,y2;..."
    # Default: 18x13m simulation garden, 1.0m inset from walls.
    area_names: ["main_mow"]
    area_polygons: ["-7.0,-6.5;11.0,-6.5;11.0,6.5;-7.0,6.5"]
    area_is_navigation: [false]
    area_obstacles: [""]
